<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Dunkler Hintergrund -->
  <rect width="100" height="100" fill="#0a0a0a"/>
  
  <!-- Gold Border Frame -->
  <rect x="10" y="10" width="80" height="80" fill="none" stroke="#C9A961" stroke-width="2"/>
  
  <!-- Stylisches "S" und "G" -->
  <text x="50" y="58" font-family="Arial, sans-serif" font-size="42" font-weight="700" fill="#C9A961" text-anchor="middle" letter-spacing="-2">SG</text>
  
  <!-- Kleine Linie/Accent unten -->
  <line x1="30" y1="72" x2="70" y2="72" stroke="#C9A961" stroke-width="2" stroke-linecap="round"/>
</svg>